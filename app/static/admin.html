<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Any Voice Chat 后台</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="admin-shell">
      <header class="admin-head">
        <div>
          <h1>后台</h1>
          <p>设置、服务状态和最近日志</p>
        </div>
        <div class="admin-actions">
          <button type="button" id="refreshAdmin">刷新</button>
          <a href="/">返回聊天</a>
        </div>
      </header>

      <input class="admin-tab-input" id="admin-tab-settings" name="admin-tab" type="radio" checked />
      <input class="admin-tab-input" id="admin-tab-status" name="admin-tab" type="radio" />
      <input class="admin-tab-input" id="admin-tab-logs" name="admin-tab" type="radio" />

      <div class="admin-tabs" role="tablist">
        <label class="admin-tab" for="admin-tab-settings" role="tab">设置</label>
        <label class="admin-tab" for="admin-tab-status" role="tab">状态</label>
        <label class="admin-tab" for="admin-tab-logs" role="tab">日志</label>
      </div>

      <section class="admin-grid">
        <section class="admin-panel admin-tab-panel settings-admin-panel" data-admin-panel="settings">
          <iframe class="settings-frame" src="/?settings=1" title="设置"></iframe>
        </section>
        <section class="admin-panel admin-tab-panel" data-admin-panel="status">
          <h2>服务状态</h2>
          <pre id="statusBox">加载中...</pre>
        </section>
        <section class="admin-panel admin-tab-panel" data-admin-panel="logs">
          <h2>应用日志</h2>
          <pre id="appLogBox">加载中...</pre>
          <h2>GSV 日志</h2>
          <pre id="gsvLogBox">加载中...</pre>
        </section>
      </section>
    </main>

    <script src="/static/admin.js"></script>
  </body>
</html>
