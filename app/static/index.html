<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Any Voice Chat</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell chat-shell">
      <section class="chat-pane" aria-label="聊天">
        <header class="topbar">
          <div class="brand">
            <h1>Any Voice Chat</h1>
            <p>ASR -> OpenAI -> GPT-SoVITS</p>
          </div>
          <div class="top-actions">
            <label class="speech-toggle" id="speechToggleWrap">
              <input id="speechToggle" type="checkbox" />
              <span class="speech-toggle-ui" aria-hidden="true"></span>
              <span class="speech-toggle-text">语音</span>
            </label>
            <a class="admin-link" href="/admin" target="_blank" rel="noreferrer">后台</a>
            <div class="status" id="statusText">待机</div>
          </div>
        </header>

        <section class="messages" id="messages"></section>

        <form class="composer" id="chatForm">
          <button class="icon-button record" type="button" id="recordButton" title="开始/停止录音">
            <span id="recordIcon">●</span>
          </button>
          <input id="messageInput" autocomplete="off" placeholder="输入文字，或点击左侧录音" />
          <button class="send-button" type="submit">发送</button>
        </form>

        <audio id="replyAudio" controls></audio>
      </section>

      <aside class="settings-pane" aria-label="设置">
        <div class="settings-head">
          <div>
            <h2>设置</h2>
            <p>本地保存，不提交仓库</p>
          </div>
          <div class="settings-actions">
            <button class="save-button" type="button" id="saveSettings">保存</button>
          </div>
        </div>

        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="openai" type="button">OpenAI</button>
          <button class="tab" data-tab="app" type="button">应用</button>
          <button class="tab" data-tab="gsv" type="button">GSV</button>
          <button class="tab" data-tab="asr" type="button">ASR</button>
        </div>

        <form class="settings-form" id="settingsForm">
          <section class="tab-panel active" data-panel="openai">
            <div class="section-title">
              <h3>模型接口</h3>
            </div>

            <label class="field span-2">
              <span class="field-head">
                <span class="field-name">API Key</span>
                <span class="help-icon" tabindex="0" data-tip="OpenAI 或兼容服务的 API Key，只保存在本机 config/user_settings.json。" aria-label="OpenAI 或兼容服务的 API Key，只保存在本机 config/user_settings.json。">i</span>
              </span>
              <input name="openai_api_key" type="password" autocomplete="off" />
            </label>

            <div class="field-grid">
              <label class="field">
                <span class="field-head">
                  <span class="field-name">Base URL</span>
                  <span class="help-icon" tabindex="0" data-tip="OpenAI 兼容接口地址，例如 https://api.openai.com/v1。" aria-label="OpenAI 兼容接口地址，例如 https://api.openai.com/v1。">i</span>
                </span>
                <input name="openai_base_url" />
              </label>

              <label class="field">
                <span class="field-head">
                  <span class="field-name">Model</span>
                  <span class="help-icon" tabindex="0" data-tip="聊天模型名称，例如 gpt-4o-mini，或你的兼容服务模型名。" aria-label="聊天模型名称，例如 gpt-4o-mini，或你的兼容服务模型名。">i</span>
                </span>
                <input name="openai_model" />
              </label>

              <label class="field">
                <span class="field-head">
                  <span class="field-name">Temperature</span>
                  <span class="help-icon" tabindex="0" data-tip="回复随机性，数值越高越发散。" aria-label="回复随机性，数值越高越发散。">i</span>
                </span>
                <input name="openai_temperature" type="number" min="0" max="2" step="0.1" />
              </label>
            </div>

            <label class="field">
              <span class="field-head">
                <span class="field-name">System Prompt</span>
                <span class="help-icon" tabindex="0" data-tip="用于控制助手说话风格和角色设定。" aria-label="用于控制助手说话风格和角色设定。">i</span>
              </span>
              <textarea name="system_prompt" rows="5"></textarea>
            </label>
          </section>

          <section class="tab-panel" data-panel="app">
            <div class="section-title">
              <h3>聊天体验</h3>
              <p>控制本应用如何拆分语音段落，以及文字和语音的展示节奏。</p>
            </div>

            <div class="field-grid">
              <label class="field">
                <span class="field-head">
                  <span class="field-name">TTS 最小段落字符数</span>
                  <span class="help-icon" tabindex="0" data-tip="大模型回复会先按句子切分；如果当前段落少于这个字符数，会继续拼下一句再发给 GSV。最后收尾段例外。" aria-label="大模型回复会先按句子切分；如果当前段落少于这个字符数，会继续拼下一句再发给 GSV。最后收尾段例外。">i</span>
                </span>
                <input name="tts_min_segment_chars" type="number" min="1" max="80" step="1" value="10" />
              </label>

              <label class="field">
                <span class="field-head">
                  <span class="field-name">TTS 软切字符数</span>
                  <span class="help-icon" tabindex="0" data-tip="没有句末标点但文本较长时，达到该长度后允许按逗号、顿号、冒号等软标点切分；填 0 关闭软切。" aria-label="没有句末标点但文本较长时，达到该长度后允许按逗号、顿号、冒号等软标点切分；填 0 关闭软切。">i</span>
                </span>
                <input name="tts_soft_segment_chars" type="number" min="0" max="500" step="1" value="60" />
              </label>

              <label class="field">
                <span class="field-head">
                  <span class="field-name">TTS 强切字符数</span>
                  <span class="help-icon" tabindex="0" data-tip="一直没有句末标点或软切点时，达到该长度后强制切分；填 0 关闭强切。" aria-label="一直没有句末标点或软切点时，达到该长度后强制切分；填 0 关闭强切。">i</span>
                </span>
                <input name="tts_force_segment_chars" type="number" min="0" max="1000" step="1" value="90" />
              </label>

              <label class="field">
                <span class="field-head">
                  <span class="field-name">文字展示模式</span>
                  <span class="help-icon" tabindex="0" data-tip="跟随语音播放：当前音频段真正开始播放时才显示对应文字；文字先显示：按大模型流式输出先把文字打出来。" aria-label="跟随语音播放：当前音频段真正开始播放时才显示对应文字；文字先显示：按大模型流式输出先把文字打出来。">i</span>
                </span>
                <select name="text_display_mode">
                  <option value="speech_sync">跟随语音播放</option>
                  <option value="text_first">文字先显示</option>
                </select>
              </label>
            </div>
          </section>

          <section class="tab-panel" data-panel="gsv">
            <div class="section-title">
              <h3>服务</h3>
              <p>启动相关配置修改后，需要停止 GSV 再重新启动。</p>
            </div>

            <label class="field">
              <span class="field-head">
                <span class="field-name">GSV API URL</span>
                <span class="help-icon" tabindex="0" data-tip="本页面连接的 GPT-SoVITS API 地址，默认 http://127.0.0.1:9880。" aria-label="本页面连接的 GPT-SoVITS API 地址，默认 http://127.0.0.1:9880。">i</span>
              </span>
              <input name="gsv_api_url" />
            </label>

            <div class="action-row">
              <button type="button" id="startGsv">启动 GSV</button>
              <button type="button" id="stopGsv">停止 GSV</button>
              <button type="button" id="checkGsv">检查连接</button>
            </div>
            <div class="gsv-status" id="gsvStatus">GSV 状态会显示在这里。</div>

            <div class="section-title compact">
              <h3>启动配置</h3>
            </div>

            <div class="field-grid three">
              <label class="field">
                <span class="field-head">
                  <span class="field-name">GSV 版本</span>
                  <span class="help-icon" tabindex="0" data-tip="决定 GSV 加载哪一代底模配置。权重路径不填时，会使用该版本默认权重。" aria-label="决定 GSV 加载哪一代底模配置。权重路径不填时，会使用该版本默认权重。">i</span>
                </span>
                <select name="gsv_version">
                  <option value="v1">v1</option>
                  <option value="v2">v2</option>
                  <option value="v2Pro">v2Pro</option>
                  <option value="v2ProPlus">v2ProPlus</option>
                  <option value="v3">v3</option>
                  <option value="v4">v4</option>
                </select>
              </label>

              <label class="field">
                <span class="field-head">
                  <span class="field-name">Device</span>
                  <span class="help-icon" tabindex="0" data-tip="GSV 推理设备。有可用 NVIDIA GPU 时选 cuda；仅 CPU 推理时选 cpu。" aria-label="GSV 推理设备。有可用 NVIDIA GPU 时选 cuda；仅 CPU 推理时选 cpu。">i</span>
                </span>
                <select name="gsv_device">
                  <option value="cuda">cuda</option>
                  <option value="cpu">cpu</option>
                </select>
              </label>

              <label class="field">
                <span class="field-head">
                  <span class="field-name">Half</span>
                  <span class="help-icon" tabindex="0" data-tip="是否使用半精度推理。GPU 通常可开启；CPU 下 GSV 会自动关闭半精度。" aria-label="是否使用半精度推理。GPU 通常可开启；CPU 下 GSV 会自动关闭半精度。">i</span>
                </span>
                <select name="gsv_is_half">
                  <option value="true">true</option>
                  <option value="false">false</option>
                </select>
              </label>
            </div>

            <div class="section-title compact">
              <h3>模型与参考</h3>
            </div>

            <label class="field">
              <span class="field-head">
                <span class="field-name">GPT 权重路径</span>
                <span class="help-icon" tabindex="0" data-tip="启动时写入运行时配置的 t2s_weights_path。不填则使用所选版本默认路径。" aria-label="启动时写入运行时配置的 t2s_weights_path。不填则使用所选版本默认路径。">i</span>
              </span>
              <input name="gpt_weights_path" placeholder="如 GPT_SoVITS/.../*.ckpt" />
            </label>

            <label class="field">
              <span class="field-head">
                <span class="field-name">SoVITS 权重路径</span>
                <span class="help-icon" tabindex="0" data-tip="启动时写入运行时配置的 vits_weights_path。不填则使用所选版本默认路径。" aria-label="启动时写入运行时配置的 vits_weights_path。不填则使用所选版本默认路径。">i</span>
              </span>
              <input name="sovits_weights_path" placeholder="如 GPT_SoVITS/.../*.pth" />
            </label>

            <label class="field">
              <span class="field-head">
                <span class="field-name">参考音频路径</span>
                <span class="help-icon" tabindex="0" data-tip="用于提供目标声线和语气的短音频，路径要能被本机 GSV 进程访问。" aria-label="用于提供目标声线和语气的短音频，路径要能被本机 GSV 进程访问。">i</span>
              </span>
              <input name="ref_audio_path" />
            </label>

            <label class="field">
              <span class="field-head">
                <span class="field-name">辅助参考音频路径</span>
                <span class="help-icon" tabindex="0" data-tip="多参考音频融合时使用，一行一个路径；不用时留空。" aria-label="多参考音频融合时使用，一行一个路径；不用时留空。">i</span>
              </span>
              <textarea name="aux_ref_audio_paths" rows="3" placeholder="一行一个路径"></textarea>
            </label>

            <label class="field">
              <span class="field-head">
                <span class="field-name">参考音频文本</span>
                <span class="help-icon" tabindex="0" data-tip="参考音频中实际说出的文字，越准确越利于音色和韵律稳定。" aria-label="参考音频中实际说出的文字，越准确越利于音色和韵律稳定。">i</span>
              </span>
              <textarea name="prompt_text" rows="3"></textarea>
            </label>

            <div class="field-grid">
              <label class="field">
                <span class="field-head"><span class="field-name">参考语种</span></span>
                <select name="prompt_lang">
                  <option value="zh">zh</option>
                  <option value="en">en</option>
                  <option value="ja">ja</option>
                  <option value="ko">ko</option>
                  <option value="yue">yue</option>
                </select>
              </label>

              <label class="field">
                <span class="field-head"><span class="field-name">输出语种</span></span>
                <select name="text_lang">
                  <option value="zh">zh</option>
                  <option value="en">en</option>
                  <option value="ja">ja</option>
                  <option value="ko">ko</option>
                  <option value="yue">yue</option>
                </select>
              </label>
            </div>

            <div class="section-title compact">
              <h3>生成参数</h3>
            </div>

            <div class="field-grid">
              <label class="field">
                <span class="field-head">
                  <span class="field-name">切分方式</span>
                  <span class="help-icon" tabindex="0" data-tip="决定一段回复如何拆给 GSV 合成。默认 cut5 按常见标点切，适合大多数中文聊天；cut0 不切，长文本可能更慢也更容易不稳。" aria-label="决定一段回复如何拆给 GSV 合成。默认 cut5 按常见标点切，适合大多数中文聊天；cut0 不切，长文本可能更慢也更容易不稳。">i</span>
                </span>
                <select name="text_split_method">
                  <option value="cut5">cut5 - 按常见标点切（推荐）</option>
                  <option value="cut0">cut0 - 不切</option>
                  <option value="cut1">cut1 - 凑四句一切</option>
                  <option value="cut2">cut2 - 凑约 50 字一切</option>
                  <option value="cut3">cut3 - 按中文句号。切</option>
                  <option value="cut4">cut4 - 按英文句号.切</option>
                </select>
              </label>

              <label class="field">
                <span class="field-head"><span class="field-name">音频格式</span></span>
                <select name="media_type">
                  <option value="wav">wav</option>
                  <option value="ogg">ogg</option>
                  <option value="aac">aac</option>
                </select>
              </label>

              <label class="field">
                <span class="field-head">
                  <span class="field-name">top_k</span>
                  <span class="help-icon" tabindex="0" data-tip="候选采样数量，越大越发散。" aria-label="候选采样数量，越大越发散。">i</span>
                </span>
                <input name="top_k" type="number" min="1" step="1" />
              </label>

              <label class="field">
                <span class="field-head">
                  <span class="field-name">top_p</span>
                  <span class="help-icon" tabindex="0" data-tip="核采样阈值，越小越保守。" aria-label="核采样阈值，越小越保守。">i</span>
                </span>
                <input name="top_p" type="number" min="0" max="1" step="0.05" />
              </label>

              <label class="field">
                <span class="field-head">
                  <span class="field-name">Temperature</span>
                  <span class="help-icon" tabindex="0" data-tip="生成随机性，越高越有变化，也更可能不稳。" aria-label="生成随机性，越高越有变化，也更可能不稳。">i</span>
                </span>
                <input name="tts_temperature" type="number" min="0" max="2" step="0.1" />
              </label>

              <label class="field">
                <span class="field-head">
                  <span class="field-name">Speed</span>
                  <span class="help-icon" tabindex="0" data-tip="语速倍率，1.0 为正常。" aria-label="语速倍率，1.0 为正常。">i</span>
                </span>
                <input name="speed_factor" type="number" min="0.5" max="2" step="0.05" />
              </label>

              <label class="field">
                <span class="field-head">
                  <span class="field-name">Streaming Mode</span>
                  <span class="help-icon" tabindex="0" data-tip="0 会完整生成后通过流式代理传输；1/2/3 是 GSV 的生成流式模式。默认 1，质量最好但较慢。" aria-label="0 会完整生成后通过流式代理传输；1/2/3 是 GSV 的生成流式模式。默认 1，质量最好但较慢。">i</span>
                </span>
                <select name="streaming_mode">
                  <option value="0">0</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                </select>
              </label>
            </div>
          </section>

          <section class="tab-panel" data-panel="asr">
            <div class="section-title">
              <h3>语音识别</h3>
            </div>
            <label class="field">
              <span class="field-head">
                <span class="field-name">ASR 语言</span>
                <span class="help-icon" tabindex="0" data-tip="浏览器录音转写时使用的识别语言。" aria-label="浏览器录音转写时使用的识别语言。">i</span>
              </span>
              <select name="asr_language">
                <option value="zh">中文 zh</option>
                <option value="yue">粤语 yue</option>
              </select>
            </label>
          </section>
        </form>
      </aside>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
